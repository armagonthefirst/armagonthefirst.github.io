<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coming Soon</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family: 'Segoe UI', sans-serif;
}

h1{
    font-size:70px;
    color:white;
    letter-spacing:6px;
    text-transform:uppercase;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff,0 0 20px #00eaff,0 0 30px #00eaff;
    }
    to{
        text-shadow:0 0 20px #fff,0 0 30px #00eaff,0 0 40px #00eaff;
    }
}
</style>

</head>

<body>
<h1>Coming Soon</h1>
</body>
